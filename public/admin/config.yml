backend:
  name: github
  repo: racinmat/presentation-website-demo
  branch: master
  # base_url points to this same site — the OAuth functions live at /auth and /callback
  base_url: https://presentation-website-demo.pages.dev

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: cs

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "aktuality"
    label: "Aktuality"
    label_singular: "Aktualita"
    folder: "src/content/aktuality"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Název"
        name: "title"
        widget: "string"
        required: true
      - label: "Datum publikace"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: true
      - label: "Perex"
        name: "description"
        widget: "text"
        required: true
      - label: "Náhledový obrázek"
        name: "heroImage"
        widget: "image"
        required: false
        allow_multiple: false
      - label: "Tagy"
        name: "tags"
        widget: "list"
        required: false
        default: []
      - label: "Obsah"
        name: "body"
        widget: "markdown"
        required: true
